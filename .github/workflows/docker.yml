name: Build and Push Docker Image

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version and repository name
        id: vars
        run: |
          VERSION=$(python3 -c "import _version; print(_version.__version__)" 2>/dev/null || echo "0.0.0")
          REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "REPOSITORY=$REPO" >> $GITHUB_OUTPUT
          echo "Version: $VERSION, Repository: $REPO"

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ steps.vars.outputs.REPOSITORY }}:latest
            ghcr.io/${{ steps.vars.outputs.REPOSITORY }}:${{ steps.vars.outputs.VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
