<form method="post" action="{% url 'entities:seedbox-delete' object.pk %}" id="deleteform">
  {% csrf_token %}

  <div class="modal-header bg-dark text-light border-secondary">
     <h5 class="modal-title">Delete Seedbox</h5>
     <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
   </div>

   <div class="modal-body bg-dark text-light">
       Are you sure you want to delete <strong>{{ object.name }}</strong>?
   </div>

  <div class="modal-footer bg-dark border-secondary">
    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
    <button type="submit" class="btn btn-danger">Delete</button>
  </div>

</form>
