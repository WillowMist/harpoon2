{%  load crispy_forms_tags %}
<form method="post" action="{% if object %}{% url 'entities:manager-update' object.pk %}{% else %}{% url 'entities:manager-create' %}{% endif %}" id="createform">
  {% csrf_token %}

  <div class="modal-header bg-dark text-light border-secondary">
     <h5 class="modal-title">{% if object %}Edit{% else %}Create{% endif %} Manager</h5>
     <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
   </div>

   <div class="modal-body bg-dark text-light">
       <div class="{% if form.non_field_errors %}invalid{% endif %} mb-2">
       {% for error in form.non_field_errors %}
         {{ error }}
       {% endfor %}
   </div>
   {% for field in form %}
     <div class="mb-3{% if field.errors %} is-invalid{% endif %}" data-field-type="{{ field.name }}">
       {{ field|as_crispy_field }}
       {% for error in field.errors %}
         <div class="invalid-feedback">{{ error }}</div>
       {% endfor %}
     </div>
   {% endfor %}
 </div>

 <div class="modal-footer bg-dark border-secondary">
   <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
   <button type="submit" class="submit-btn btn btn-primary">Save Changes</button>
 </div>

</form>

<script>
(function() {
  function toggleFields() {
    var managerType = document.querySelector('select[name="managertype"]');
    if (!managerType) return;
    
    var isBlackhole = managerType.value === 'Blackhole';
    
    // Fields to show/hide
    var arrFields = ['url', 'apikey', 'folder', 'label'];
    var blackholeFields = [
      'monitor_directory', 'monitor_subdirectories', 'category',
      'torrent_downloader', 'nzb_downloader', 'temp_folder',
      'poll_interval', 'move_on_complete', 'delete_source',
      'duplicate_handling', 'enabled', 'scan_on_startup'
    ];
    
    // Toggle *arr fields
    arrFields.forEach(function(fieldName) {
      var fieldDiv = document.querySelector('[data-field-type="' + fieldName + '"]');
      if (fieldDiv) {
        fieldDiv.style.display = isBlackhole ? 'none' : 'block';
      }
    });
    
    // Toggle Blackhole fields
    blackholeFields.forEach(function(fieldName) {
      var fieldDiv = document.querySelector('[data-field-type="' + fieldName + '"]');
      if (fieldDiv) {
        fieldDiv.style.display = isBlackhole ? 'block' : 'none';
      }
    });
  }
  
  // Run on page load
  toggleFields();
  
  // Run when manager type changes
  var managerType = document.querySelector('select[name="managertype"]');
  if (managerType) {
    managerType.addEventListener('change', toggleFields);
  }
  
  // Also run when modal is shown (for Bootstrap modals)
  document.addEventListener('shown.bs.modal', toggleFields);
})();
</script>
