{% extends 'base.html' %}

{% block title %}Settings{% endblock %}

{% block content %}
<div>
    <h3>Managers <a href="{% url 'entities:manager-create' %}" data-modal-url="{% url 'entities:manager-create' %}" class="modal-link btn btn-sm btn-primary"><i class="fa fa-fw fa-plus-circle"></i> Add Manager</a></h3>
</div>
    <div class="card-columns">
{% for manager in managers %}
        <div id="manager_info" class="card bg-dark text-white" style="width: 20rem;">

            <div class="card-header bg-primary"><h4 class="card-title">{{ manager.name }}
                <a href="{% url 'entities:manager-update' manager.pk %}" data-modal-url="{% url 'entities:manager-update' manager.pk %}" class="modal-link btn btn-sm btn-primary border-secondary"><i class="fa fa-fw fa-pencil-alt"></i></a>
                <a href="{% url 'entities:manager-test' manager.pk %}" data-modal-url="{% url 'entities:manager-test' manager.pk %}" class="modal-link btn btn-sm btn-info border-secondary"><i class="fa fa-fw fa-fingerprint"></i></a>
                <a href="{% url 'entities:manager-delete' manager.pk %}" data-modal-url="{% url 'entities:manager-delete' manager.pk %}" class="modal-link btn btn-sm btn-danger border-secondary"><i class="fa fa-fw fa-trash"></i></a>
                </h4>
            </div>
            <div class="card-body px-1">
                <div><b>URL:</b> {{ manager.url }}</div>
                <div><b>Label:</b> {{ manager.label }}</div>
                <div><b>Folder:</b> {{ manager.folder }}</div>
            </div>
        </div>
{% endfor %}
    </div>
{% endblock %}
