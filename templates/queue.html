{% extends 'base.html' %}

{% block title %}Queue{% endblock %}

{% block head %}
<style>
.expand-icon {
    cursor: pointer;
    user-select: none;
    font-weight: bold;
    color: #0d6efd;
}
.expand-icon:hover {
    color: #0b5ed7;
}
.details-row {
    display: none;
}
.details-row.show {
    display: table-row;
}
.details-cell-content {
    padding: 15px;
    background: rgba(0, 0, 0, 0.2);
}
.btn-sm-compact {
    padding: 0.25rem 0.5rem;
    font-size: 0.8rem;
}

/* Mobile responsive styles */
@media (max-width: 768px) {
    .table {
        font-size: 0.85rem;
    }
    
    .table th, .table td {
        padding: 0.5rem 0.25rem;
    }
    
    .btn-sm-compact {
        padding: 0.2rem 0.4rem;
        font-size: 0.75rem;
    }
    
    .details-cell-content {
        padding: 10px;
    }
}

@media (max-width: 576px) {
    .table {
        font-size: 0.75rem;
    }
    
    .table th, .table td {
        padding: 0.4rem 0.2rem;
    }
    
    /* Hide non-essential columns on small phones */
    .table th:nth-child(4),
    .table td:nth-child(4),
    .table th:nth-child(5),
    .table td:nth-child(5) {
        display: none;
    }
    
    .expand-icon {
        font-size: 0.9rem;
    }
    
    .details-cell-content {
        padding: 8px;
        font-size: 0.75rem;
    }
    
    .details-cell-content .row {
        flex-direction: column;
    }
    
    .details-cell-content .col-md-6 {
        width: 100%;
        margin-bottom: 0.5rem;
    }
}
</style>
{% endblock %}

{% block content %}
<h2 class="mb-4">Download Queue</h2>

<!-- Post-Processing Card -->
<div id="postprocessingCard" class="card bg-dark text-white mb-4" style="display: none;">
    <div class="card-header bg-warning">
        <h5 class="card-title mb-0"><i class="fas fa-cog me-2"></i>Post-Processing (<span id="postprocessingCount">0</span>)</h5>
    </div>
    <div class="card-body p-0">
        <table class="table table-dark table-striped mb-0">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Manager</th>
                    <th>Downloader</th>
                    <th>Updated</th>
                </tr>
            </thead>
            <tbody id="postprocessingList">
            </tbody>
        </table>
    </div>
</div>

<!-- Queued Items Card -->
<div id="queuedCard" class="card bg-dark text-white mb-4" style="display: none;">
    <div class="card-header bg-info">
        <h5 class="card-title mb-0"><i class="fas fa-clock me-2"></i>Queued (<span id="queuedCount">0</span>)</h5>
    </div>
    <div class="card-body p-0">
        <table class="table table-dark table-striped mb-0">
            <thead>
                <tr>
                    <th style="width: 30px;"></th>
                    <th>Name</th>
                    <th>Manager</th>
                    <th>Downloader</th>
                    <th>Added</th>
                    <th style="width: 100px;">Actions</th>
                </tr>
            </thead>
            <tbody id="queuedList">
            </tbody>
        </table>
    </div>
</div>

<div id="emptyAlert" class="alert alert-info" style="display: none;">
    <i class="fas fa-info-circle me-2"></i>Queue is empty.
</div>

<script>
let queuePollingInterval = null;
let expandedRows = new Set();

function timeSince(dateString) {
    const date = new Date(dateString);
    const now = new Date();
    const seconds = Math.floor((now - date) / 1000);
    
    if (seconds < 60) return seconds + ' seconds';
    const minutes = Math.floor(seconds / 60);
    if (minutes < 60) return minutes + ' minutes';
    const hours = Math.floor(minutes / 60);
    if (hours < 24) return hours + ' hours';
    const days = Math.floor(hours / 24);
    return days + ' days';
}

function toggleDetails(row) {
    const itemId = row.dataset.itemId;
    const nextRow = row.nextElementSibling;
    if (nextRow && nextRow.classList.contains('details-row')) {
        nextRow.classList.toggle('show');
        const icon = row.querySelector('.expand-icon');
        if (nextRow.classList.contains('show')) {
            icon.style.transform = 'rotate(90deg)';
            expandedRows.add(itemId);
        } else {
            icon.style.transform = 'rotate(0deg)';
            expandedRows.delete(itemId);
        }
    }
}

function cancelDownload(hash) {
    if (!confirm('Cancel this download?')) return;
    fetch('/download/' + hash + '/cancel/', {
        method: 'POST',
        headers: {
            'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]')?.value || ''
        }
    })
    .then(response => {
        if (response.ok) {
            loadQueueData();
        } else {
            alert('Failed to cancel download');
        }
    })
    .catch(error => console.error('Error:', error));
}

function renderQueueItems(items) {
    const tbody = document.getElementById('queuedList');
    if (items.length === 0) {
        return '';
    }
    
    return items.map(item => `
        <tr data-item-id="${item.hash}" onclick="toggleDetails(this)" style="cursor: pointer;">
            <td><span class="expand-icon" style="transform: ${expandedRows.has(item.hash) ? 'rotate(90deg)' : 'rotate(0deg)'}">▶</span></td>
            <td>${item.name.substring(0, 50)}</td>
            <td>${item.manager}</td>
            <td>${item.downloader || '<span class="text-warning">Pending</span>'}</td>
            <td>${timeSince(item.created)} ago</td>
            <td onclick="event.stopPropagation(); cancelDownload('${item.hash}');">
                <button class="btn btn-danger btn-sm-compact" title="Cancel this download">Cancel</button>
            </td>
        </tr>
        <tr class="details-row ${expandedRows.has(item.hash) ? 'show' : ''}" data-item-id="${item.hash}">
            <td colspan="6">
                <div class="details-cell-content">
                    <div class="row">
                        <div class="col-md-6">
                            <strong>Download Hash:</strong><br>
                            <code>${item.hash}</code>
                        </div>
                        <div class="col-md-6">
                            <strong>Status:</strong><br>
                            <span class="badge bg-info">${item.status}</span>
                        </div>
                    </div>
                    <hr style="border-color: rgba(255, 255, 255, 0.1);">
                    <div class="row">
                        <div class="col-md-6">
                            <strong>Manager:</strong><br>
                            ${item.manager}
                        </div>
                        <div class="col-md-6">
                            <strong>Downloader:</strong><br>
                            ${item.downloader || '<span class="text-warning">Not assigned yet</span>'}
                        </div>
                    </div>
                </div>
            </td>
        </tr>
    `).join('');
}

function renderPostProcessingItems(items) {
    const tbody = document.getElementById('postprocessingList');
    if (items.length === 0) {
        return '';
    }
    
    return items.map(item => `
        <tr>
            <td>${item.name.substring(0, 50)}</td>
            <td>${item.manager}</td>
            <td>${item.downloader}</td>
            <td>${timeSince(item.modified)} ago</td>
        </tr>
    `).join('');
}

function loadQueueData() {
    fetch('/api/queue/')
        .then(response => response.json())
        .then(data => {
            const ppCard = document.getElementById('postprocessingCard');
            const queuedCard = document.getElementById('queuedCard');
            const emptyAlert = document.getElementById('emptyAlert');
            
            const postprocessingItems = data.items.filter(i => i.status === 'PostProcessing');
            const queuedItems = data.items.filter(i => i.status === 'Grabbed');
            
            // Render Post-Processing
            if (postprocessingItems.length > 0) {
                ppCard.style.display = 'block';
                document.getElementById('postprocessingCount').textContent = postprocessingItems.length;
                document.getElementById('postprocessingList').innerHTML = renderPostProcessingItems(postprocessingItems);
            } else {
                ppCard.style.display = 'none';
            }
            
            // Render Queued
            if (queuedItems.length > 0) {
                queuedCard.style.display = 'block';
                document.getElementById('queuedCount').textContent = queuedItems.length;
                document.getElementById('queuedList').innerHTML = renderQueueItems(queuedItems);
            } else {
                queuedCard.style.display = 'none';
            }
            
            // Show empty message
            if (postprocessingItems.length === 0 && queuedItems.length === 0) {
                emptyAlert.style.display = 'block';
            } else {
                emptyAlert.style.display = 'none';
            }
        })
        .catch(error => console.error('Error loading queue:', error));
}

// Start polling when page loads
document.addEventListener('DOMContentLoaded', function() {
    loadQueueData();
    queuePollingInterval = setInterval(loadQueueData, 3000); // Poll every 3 seconds
});

// Cleanup on page unload
window.addEventListener('beforeunload', function() {
    if (queuePollingInterval) {
        clearInterval(queuePollingInterval);
    }
});
</script>

{% endblock %}
